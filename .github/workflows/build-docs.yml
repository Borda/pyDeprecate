#
# Build & Deploy Docs
#
# Flow:
#
#   [push → main] / [push → final release tag] / [pull_request → main]
#     │
#     ├─ resolve-deploy-context ── decides:
#     │    ├─ main push            → build + deploy to latest/
#     │    ├─ final release tag    → build + deploy to <tag>/ and stable/ if highest tag
#     │    ├─ non-release tag      → skip build/deploy
#     │    └─ pull request         → build only (no deploy)
#     │
#     ├─ build-landing-docs ──┐
#     ├─ build-demo-sphinx ───┤
#     └─ build-demo-mkdocs ───┤
#                             ▼
#                          assemble-site (always for buildable events)
#                             ├─ download portal, sphinx, mkdocs artifacts
#                             ├─ assemble _site/{demo-sphinx,demo-mkdocs} + portal at root
#                             └─ upload assembled-site artifact
#                             ▼ [deployable pushes only]
#                          deploy-pages
#                             ├─ download assembled site artifact
#                             ├─ mike deploy <version_path> [aliases…] --push --update-aliases
#                             ├─ mike set-default --push <latest|stable>
#                             └─ mike commits & pushes gh-pages atomically
#
#   permissions:
#     - default workflow permission is contents: read
#     - deploy-pages escalates to contents/pages/id-token write only when deploying
#
name: Build & Deploy Docs

on:
  push:
    branches: [main]
    tags: ["*"]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  GH_PAGES_BRANCH: gh-pages
  PYTHON_DEFAULT: "3.13"
  # Final release tags only — accepts optional 'v'/'V' prefix and two+ numeric segments.
  # Accepted: v1.2, v1.2.3, 1.2.3, V2.0    Rejected: v1.0.0rc1, 1.2.0.dev1, v1 (one segment), v1.2.3-final
  RELEASE_TAG_PATTERN: '^[vV]?[0-9]+(\.[0-9]+)+$'

jobs:
  resolve-deploy-context:
    name: Resolve deploy context
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.context.outputs.should_build }}
      should_deploy: ${{ steps.context.outputs.should_deploy }}
      stable_tag: ${{ steps.context.outputs.stable_tag }}
      version_path: ${{ steps.context.outputs.version_path }}

    steps:
      - name: 🔀 Checkout repository
        uses: actions/checkout@v6
        with:
          # Full history only needed for tag events (stable_tag scan via git tag --list).
          # Branch pushes and PRs use a shallow clone to avoid the overhead.
          fetch-depth: ${{ github.ref_type == 'tag' && 0 || 1 }}

      - name: 🧮 Resolve target version
        id: context
        shell: bash
        run: |
          set -euo pipefail

          should_build=true
          should_deploy=false
          stable_tag=""
          version_path=""

          if [ "${GITHUB_EVENT_NAME}" = "push" ] && [ "${GITHUB_REF_TYPE:-}" = "branch" ] && [ "${GITHUB_REF_NAME}" = "main" ]; then
            should_deploy=true
            version_path="latest"
          elif [ "${GITHUB_EVENT_NAME}" = "push" ] && [ "${GITHUB_REF_TYPE:-}" = "tag" ]; then
            should_build=false

            if printf '%s' "${GITHUB_REF_NAME}" | grep -Eq "${RELEASE_TAG_PATTERN}"; then
              should_build=true
              should_deploy=true
              version_path="${GITHUB_REF_NAME}"
              # stable_tag only needed for release-tag deploys (to mirror highest tag → stable/).
              # Full tag history is available here because fetch-depth=0 for tag events.
              stable_tag="$(git tag --list | grep -E "${RELEASE_TAG_PATTERN}" | sort -V | tail -1)"
            else
              echo "Skipping deploy: tag '${GITHUB_REF_NAME}' does not match RELEASE_TAG_PATTERN (${RELEASE_TAG_PATTERN}) — dev/rc/post tags are excluded from versioned docs deploys."
            fi
          fi

          {
            echo "should_build=${should_build}"
            echo "should_deploy=${should_deploy}"
            echo "stable_tag=${stable_tag}"
            echo "version_path=${version_path}"
          } >> "${GITHUB_OUTPUT}"

      - name: 🔍 Debug — resolved deploy context
        if: always()
        run: |
          echo "should_build=${{ steps.context.outputs.should_build }}"
          echo "should_deploy=${{ steps.context.outputs.should_deploy }}"
          echo "stable_tag=${{ steps.context.outputs.stable_tag }}"
          echo "version_path=${{ steps.context.outputs.version_path }}"

  build-landing-docs:
    name: Portal (landing-docs)
    needs: [resolve-deploy-context]
    if: needs.resolve-deploy-context.outputs.should_build == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: 🔀 Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 🐍 Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_DEFAULT }}
          cache: pip

      - name: 📦 Install portal dependencies
        run: pip install -r docs/requirements.txt

      - name: 📖 Build portal
        # Documentation screenshots (demo-docs-*.png) live under docs/assets/images/ so MkDocs picks them up
        # natively without a copy step.
        run: mkdocs build --strict

      - name: 📄 Copy Markdown sources into site for .md URL support
        run: |
          mkdir -p site
          cp docs/index.md site/index.md

      - name: 📤 Upload portal artifact
        uses: actions/upload-artifact@v7
        with:
          name: portal-docs
          path: site/
          retention-days: 7

  build-demo-sphinx:
    name: Demo Sphinx (RST)
    needs: [resolve-deploy-context]
    if: needs.resolve-deploy-context.outputs.should_build == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: 🔀 Checkout repository
        uses: actions/checkout@v6

      - name: 🐍 Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_DEFAULT }}
          cache: pip

      - name: 📦 Install package + Sphinx dependencies
        run: pip install . -r demo-docs/sphinx/requirements.txt

      - name: 📖 Build Sphinx documentation
        working-directory: demo-docs/sphinx
        run: make html

      - name: 📤 Upload Sphinx docs artifact
        uses: actions/upload-artifact@v7
        with:
          name: sphinx-docs
          path: demo-docs/sphinx/build/html/
          retention-days: 7

  build-demo-mkdocs:
    name: Demo MkDocs (Markdown)
    needs: [resolve-deploy-context]
    if: needs.resolve-deploy-context.outputs.should_build == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: 🔀 Checkout repository
        uses: actions/checkout@v6

      - name: 🐍 Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_DEFAULT }}
          cache: pip

      - name: 📦 Install package + MkDocs dependencies
        run: pip install . -r demo-docs/mkdocs/requirements.txt

      - name: 📖 Build MkDocs documentation
        working-directory: demo-docs/mkdocs
        run: mkdocs build --strict

      - name: 📤 Upload MkDocs docs artifact
        uses: actions/upload-artifact@v7
        with:
          name: mkdocs-docs
          path: demo-docs/mkdocs/site/
          retention-days: 7

  assemble-site:
    name: Assemble Site
    needs: [resolve-deploy-context, build-landing-docs, build-demo-sphinx, build-demo-mkdocs]
    if: needs.resolve-deploy-context.outputs.should_build == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Download portal artifact
        uses: actions/download-artifact@v8
        with:
          name: portal-docs
          path: _site

      - name: 📥 Download Sphinx artifact
        uses: actions/download-artifact@v8
        with:
          name: sphinx-docs
          path: _site/demo-sphinx

      - name: 📥 Download MkDocs artifact
        uses: actions/download-artifact@v8
        with:
          name: mkdocs-docs
          path: _site/demo-mkdocs

      - name: 📤 Upload assembled site artifact
        uses: actions/upload-artifact@v7
        with:
          name: assembled-site
          path: _site/
          retention-days: 7

  deploy-pages:
    name: Deploy to GH Pages
    needs: [resolve-deploy-context, assemble-site]
    if: needs.resolve-deploy-context.outputs.should_deploy == 'true'
    concurrency:
      group: gh-pages
      cancel-in-progress: false
    permissions:
      contents: write
      id-token: write
      pages: write
    runs-on: ubuntu-latest

    steps:
      - name: 🔀 Checkout repository
        uses: actions/checkout@v6

      - name: 🐍 Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_DEFAULT }}
          cache: pip

      - name: 📦 Install mike
        run: pip install -r docs/requirements.txt

      - name: 🔑 Configure git identity for mike
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: 📥 Fetch existing gh-pages branch (if any)
        shell: bash
        run: |
          set -euo pipefail
          # mike commits onto gh-pages; if the branch already exists, pull it locally so mike rebases instead of orphaning.
          if git ls-remote --exit-code --heads origin "${GH_PAGES_BRANCH}" >/dev/null 2>&1; then
            git fetch origin "${GH_PAGES_BRANCH}:${GH_PAGES_BRANCH}"
          else
            echo "No remote ${GH_PAGES_BRANCH} branch yet — mike will create it on first deploy."
          fi

      - name: 📥 Download assembled site artifact
        uses: actions/download-artifact@v8
        with:
          name: assembled-site
          path: /tmp/assembled-site

      - name: 📂 Inject demo subsites into docs dir
        shell: bash
        run: |
          set -euo pipefail
          # Copy pre-built Sphinx and MkDocs demo HTML into docs/ so that mike's
          # `mkdocs build` includes them as static assets in a single deployment.
          mkdir -p docs/demo-sphinx docs/demo-mkdocs
          rsync -a /tmp/assembled-site/demo-sphinx/ docs/demo-sphinx/
          rsync -a /tmp/assembled-site/demo-mkdocs/ docs/demo-mkdocs/

      - name: 🚀 Deploy with mike
        env:
          STABLE_TAG: ${{ needs.resolve-deploy-context.outputs.stable_tag }}
          VERSION_PATH: ${{ needs.resolve-deploy-context.outputs.version_path }}
        shell: bash
        run: |
          set -euo pipefail

          [ -n "${VERSION_PATH}" ] || {
            echo "ERROR: VERSION_PATH is empty. resolve-deploy-context did not produce a deployable target." >&2
            exit 1
          }

          # mike runs `mkdocs build` itself when invoked, so it will rebuild the portal with the version
          # selector dropdown wired into the theme. The demo subdirs (Sphinx/MkDocs) were injected into
          # docs/ in the prior step, so mkdocs picks them up as static assets — no overlay needed.
          aliases=()
          set_default=""

          if [ "${VERSION_PATH}" = "latest" ]; then
            # main-branch push: deploy under the literal "latest" version and make it the default landing page.
            set_default="latest"
          elif [ -n "${STABLE_TAG}" ] && [ "${VERSION_PATH}" = "${STABLE_TAG}" ]; then
            # Highest final release tag: alias to "stable" and make stable the default landing page.
            aliases=("stable")
            set_default="stable"
          fi
          # Older release tag (not the highest): publish the version without touching aliases or default.

          # `--update-aliases` allows reassigning an existing alias (e.g. moving "stable" forward).
          # Run mike commands without --push, then a single `git push` at the end so deploy + set-default
          # land atomically (avoids the race window between two separate --push calls).
          # `${aliases[@]+"${aliases[@]}"}` is the empty-array-safe expansion under `set -u`.
          mike deploy \
            --update-aliases \
            --branch "${GH_PAGES_BRANCH}" \
            "${VERSION_PATH}" \
            ${aliases[@]+"${aliases[@]}"}

          if [ -n "${set_default}" ]; then
            mike set-default --branch "${GH_PAGES_BRANCH}" "${set_default}"
          fi

          git push origin "${GH_PAGES_BRANCH}"

      - name: 📥 Checkout gh-pages for artifact upload
        uses: actions/checkout@v6
        with:
          ref: ${{ env.GH_PAGES_BRANCH }}
          path: /tmp/gh-pages-content
          fetch-depth: 1

      - name: ⚙️ Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: 📤 Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: /tmp/gh-pages-content

      - name: 🌐 Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
