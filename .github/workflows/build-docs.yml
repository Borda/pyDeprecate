#
# Build & Deploy Docs
#
# Flow:
#
#   Triggers (filtered at the workflow level):
#     - push тЖТ main                                    тЖТ build + deploy to latest/
#     - push тЖТ version-like tag (v1.2, 1.2.3, тАж)       тЖТ build + deploy to <tag>/ (and stable/ if highest)
#     - pull_request тЖТ main                            тЖТ build only (no deploy)
#
#   Jobs:
#     resolve-stable-tag (tag pushes only) тФАтФА finds highest release tag for stable/ alias
#
#     build-landing-docs тФАтФАтФР
#     build-demo-sphinx тФАтФАтФАтФд  (run on every trigger)
#     build-demo-mkdocs тФАтФАтФАтФд
#                          тЦ╝
#                       assemble-site
#                          тФЬтФА download portal, sphinx, mkdocs artifacts
#                          тФЬтФА assemble _site/{demo-sphinx,demo-mkdocs} + portal at root
#                          тФФтФА upload assembled-site artifact
#                          тЦ╝ [push events only тАФ pull_request skips deploy]
#                       deploy-pages
#                          тФЬтФА download assembled site artifact
#                          тФЬтФА mike deploy <version_path> [aliasesтАж] --update-aliases
#                          тФЬтФА mike set-default <latest|stable>
#                          тФФтФА git push gh-pages atomically
#
#   permissions:
#     - default workflow permission is contents: read
#     - deploy-pages escalates to contents/pages/id-token write only when deploying
#
name: Build & Deploy Docs

on:
  push:
    branches: [main]
    # Version-like tags only тАФ non-version tags (test, feature, etc.) are excluded at trigger level.
    # rc/dev/post tags that resemble semver (e.g. v1.2.3rc1) may still trigger a build but
    # will be excluded from deployment because they won't match RELEASE_TAG_PATTERN.
    tags:
      - "v[0-9]*.[0-9]*" # v1.2, v1.2.3 тАФ broad semver glob
      - "[0-9]*.[0-9]*" # 1.2, 1.2.3 тАФ no v prefix
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  GH_PAGES_BRANCH: gh-pages
  PYTHON_DEFAULT: "3.13"
  # Final release tags only тАФ accepts optional 'v'/'V' prefix and two+ numeric segments.
  # Accepted: v1.2, v1.2.3, 1.2.3, V2.0    Rejected: v1.0.0rc1, 1.2.0.dev1, v1 (one segment), v1.2.3-final
  RELEASE_TAG_PATTERN: '^[vV]?[0-9]+(\.[0-9]+)+$'

jobs:
  resolve-stable-tag:
    name: Resolve stable tag
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    outputs:
      value: ${{ steps.tag.outputs.value }}

    steps:
      - name: ЁЯФА Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: ЁЯП╖я╕П Find highest release tag
        id: tag
        shell: bash
        run: |
          set -euo pipefail
          stable_tag="$((git tag --list | { grep -E "${RELEASE_TAG_PATTERN}" || true; } | sort -V | tail -1))"
          if [[ -n "${stable_tag}" ]]; then
            echo "value=${stable_tag}" >> "${GITHUB_OUTPUT}"
          else
            echo "value=" >> "${GITHUB_OUTPUT}"
          fi

  build-landing-docs:
    name: Portal (landing-docs)
    runs-on: ubuntu-latest

    steps:
      - name: ЁЯФА Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: ЁЯРН Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_DEFAULT }}
          cache: pip

      - name: ЁЯУж Install portal dependencies
        run: pip install -r docs/requirements.txt

      - name: ЁЯУЦ Build portal
        # Documentation screenshots (demo-docs-*.png) live under docs/assets/images/ so MkDocs picks them up
        # natively without a copy step.
        run: mkdocs build --strict

      - name: ЁЯУД Copy Markdown sources into site for .md URL support
        run: |
          mkdir -p site
          cp docs/index.md site/index.md

      - name: ЁЯУд Upload portal artifact
        uses: actions/upload-artifact@v7
        with:
          name: portal-docs
          path: site/
          retention-days: 7

  build-demo-sphinx:
    name: Demo Sphinx (RST)
    runs-on: ubuntu-latest

    steps:
      - name: ЁЯФА Checkout repository
        uses: actions/checkout@v6

      - name: ЁЯРН Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_DEFAULT }}
          cache: pip

      - name: ЁЯУж Install package + Sphinx dependencies
        run: pip install . -r demo-docs/sphinx/requirements.txt

      - name: ЁЯУЦ Build Sphinx documentation
        working-directory: demo-docs/sphinx
        run: make html

      - name: ЁЯУд Upload Sphinx docs artifact
        uses: actions/upload-artifact@v7
        with:
          name: sphinx-docs
          path: demo-docs/sphinx/build/html/
          retention-days: 7

  build-demo-mkdocs:
    name: Demo MkDocs (Markdown)
    runs-on: ubuntu-latest

    steps:
      - name: ЁЯФА Checkout repository
        uses: actions/checkout@v6

      - name: ЁЯРН Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_DEFAULT }}
          cache: pip

      - name: ЁЯУж Install package + MkDocs dependencies
        run: pip install . -r demo-docs/mkdocs/requirements.txt

      - name: ЁЯУЦ Build MkDocs documentation
        working-directory: demo-docs/mkdocs
        run: mkdocs build --strict

      - name: ЁЯУд Upload MkDocs docs artifact
        uses: actions/upload-artifact@v7
        with:
          name: mkdocs-docs
          path: demo-docs/mkdocs/site/
          retention-days: 7

  assemble-site:
    name: Assemble Site
    needs: [build-landing-docs, build-demo-sphinx, build-demo-mkdocs]
    runs-on: ubuntu-latest

    steps:
      - name: ЁЯУе Download portal artifact
        uses: actions/download-artifact@v8
        with:
          name: portal-docs
          path: _site

      - name: ЁЯУе Download Sphinx artifact
        uses: actions/download-artifact@v8
        with:
          name: sphinx-docs
          path: _site/demo-sphinx

      - name: ЁЯУе Download MkDocs artifact
        uses: actions/download-artifact@v8
        with:
          name: mkdocs-docs
          path: _site/demo-mkdocs

      - name: ЁЯУд Upload assembled site artifact
        uses: actions/upload-artifact@v7
        with:
          name: assembled-site
          path: _site/
          retention-days: 7

  deploy-pages:
    name: Deploy to GH Pages
    needs: [assemble-site, resolve-stable-tag]
    if: github.event_name == 'push' && (needs.resolve-stable-tag.result == 'success' || needs.resolve-stable-tag.result == 'skipped')
    concurrency:
      group: gh-pages
      cancel-in-progress: false
    permissions:
      contents: write
      id-token: write
      pages: write
    runs-on: ubuntu-latest

    steps:
      - name: ЁЯФА Checkout repository
        uses: actions/checkout@v6

      - name: ЁЯРН Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_DEFAULT }}
          cache: pip

      - name: ЁЯУж Install mike
        run: pip install -r docs/requirements.txt

      - name: ЁЯФС Configure git identity for mike
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: ЁЯУе Fetch existing gh-pages branch (if any)
        shell: bash
        run: |
          set -euo pipefail
          # mike commits onto gh-pages; if the branch already exists, pull it locally so mike rebases instead of orphaning.
          if git ls-remote --exit-code --heads origin "${GH_PAGES_BRANCH}" >/dev/null 2>&1; then
            git fetch origin "${GH_PAGES_BRANCH}:${GH_PAGES_BRANCH}"
          else
            echo "No remote ${GH_PAGES_BRANCH} branch yet тАФ mike will create it on first deploy."
          fi

      - name: ЁЯУе Download assembled site artifact
        uses: actions/download-artifact@v8
        with:
          name: assembled-site
          path: /tmp/assembled-site

      - name: ЁЯУВ Inject demo subsites into docs dir
        shell: bash
        run: |
          set -euo pipefail
          # Copy pre-built Sphinx and MkDocs demo HTML into docs/ so that mike's
          # `mkdocs build` includes them as static assets in a single deployment.
          mkdir -p docs/demo-sphinx docs/demo-mkdocs
          rsync -a /tmp/assembled-site/demo-sphinx/ docs/demo-sphinx/
          rsync -a /tmp/assembled-site/demo-mkdocs/ docs/demo-mkdocs/

      - name: ЁЯЪА Deploy with mike
        env:
          STABLE_TAG: ${{ needs.resolve-stable-tag.outputs.value }}
        shell: bash
        run: |
          set -euo pipefail

          # version_path: "latest" for branch pushes, tag name for tag pushes
          if [ "${GITHUB_REF_TYPE}" = "branch" ]; then
            VERSION_PATH="latest"
          else
            if [[ ! "${GITHUB_REF_NAME}" =~ ${RELEASE_TAG_PATTERN} ]]; then
              echo "Skipping docs deploy for non-final tag: ${GITHUB_REF_NAME}"
              exit 0
            fi
            VERSION_PATH="${GITHUB_REF_NAME}"
          fi

          # mike runs `mkdocs build` itself when invoked, so it will rebuild the portal with the version
          # selector dropdown wired into the theme. The demo subdirs (Sphinx/MkDocs) were injected into
          # docs/ in the prior step, so mkdocs picks them up as static assets тАФ no overlay needed.
          aliases=()
          set_default=""

          if [ "${VERSION_PATH}" = "latest" ]; then
            # main-branch push: deploy under the literal "latest" version and make it the default landing page.
            set_default="latest"
          elif [ -n "${STABLE_TAG}" ] && [ "${VERSION_PATH}" = "${STABLE_TAG}" ]; then
            # Highest final release tag: alias to "stable" and make stable the default landing page.
            aliases=("stable")
            set_default="stable"
          fi
          # Older release tag (not the highest): publish the version without touching aliases or default.

          # `--update-aliases` allows reassigning an existing alias (e.g. moving "stable" forward).
          # Run mike commands without --push, then a single `git push` at the end so deploy + set-default
          # land atomically (avoids the race window between two separate --push calls).
          # `${aliases[@]+"${aliases[@]}"}` is the empty-array-safe expansion under `set -u`.
          mike deploy \
            --update-aliases \
            --branch "${GH_PAGES_BRANCH}" \
            "${VERSION_PATH}" \
            ${aliases[@]+"${aliases[@]}"}

          if [ -n "${set_default}" ]; then
            mike set-default --branch "${GH_PAGES_BRANCH}" "${set_default}"
          fi

          git push origin "${GH_PAGES_BRANCH}"

      - name: ЁЯУе Checkout gh-pages for artifact upload
        uses: actions/checkout@v6
        with:
          ref: ${{ env.GH_PAGES_BRANCH }}
          path: /tmp/gh-pages-content
          fetch-depth: 1

      - name: ЁЯЧСя╕П Strip git metadata from Pages content
        run: rm -rf /tmp/gh-pages-content/.git

      - name: тЪЩя╕П Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: ЁЯУд Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: /tmp/gh-pages-content

      - name: ЁЯМР Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
