name: Build & Deploy Docs

on:
  push:
    branches: [main]
    tags: ["*"]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  GH_PAGES_BRANCH: gh-pages
  PYTHON_DEFAULT: "3.13"
  RELEASE_TAG_PATTERN: '^[vV]?[0-9]+(\.[0-9]+)*$'

jobs:
  resolve-deploy-context:
    name: Resolve deploy context
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.context.outputs.should_build }}
      should_deploy: ${{ steps.context.outputs.should_deploy }}
      stable_tag: ${{ steps.context.outputs.stable_tag }}
      version_path: ${{ steps.context.outputs.version_path }}

    steps:
      - name: 🔀 Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 🧮 Resolve target version
        id: context
        shell: bash
        run: |
          set -euo pipefail

          should_build=true
          should_deploy=false
          stable_tag=""
          version_path=""

          stable_tag="$(python -c "import os, re, subprocess; pattern = os.environ['RELEASE_TAG_PATTERN']; tags = subprocess.check_output(['git', 'tag', '--list'], text=True).splitlines(); release_tags = [tag for tag in tags if re.fullmatch(pattern, tag)]; print(max(release_tags, key=lambda tag: tuple(int(part) for part in tag.lstrip('vV').split('.'))), end='') if release_tags else None")"

          if [ "${GITHUB_EVENT_NAME}" = "push" ] && [ "${GITHUB_REF_TYPE:-}" = "branch" ] && [ "${GITHUB_REF_NAME}" = "main" ]; then
            should_deploy=true
            version_path="latest"
          elif [ "${GITHUB_EVENT_NAME}" = "push" ] && [ "${GITHUB_REF_TYPE:-}" = "tag" ]; then
            should_build=false

            if printf '%s' "${GITHUB_REF_NAME}" | grep -Eq "${RELEASE_TAG_PATTERN}"; then
              should_build=true
              should_deploy=true
              version_path="${GITHUB_REF_NAME}"
            fi
          fi

          {
            echo "should_build=${should_build}"
            echo "should_deploy=${should_deploy}"
            echo "stable_tag=${stable_tag}"
            echo "version_path=${version_path}"
          } >> "${GITHUB_OUTPUT}"

  build-landing-docs:
    name: Portal (landing-docs)
    needs: [resolve-deploy-context]
    if: needs.resolve-deploy-context.outputs.should_build == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: 🔀 Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 🐍 Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_DEFAULT }}
          cache: pip

      - name: 📦 Install portal dependencies
        run: pip install -r docs/requirements.txt

      - name: 📄 Copy assets into portal docs
        run: cp -r assets docs/assets

      - name: 📖 Build portal
        run: mkdocs build --strict

      - name: 📄 Copy Markdown sources into site for .md URL support
        run: |
          mkdir -p site
          cp docs/index.md site/index.md

      - name: 📤 Upload portal artifact
        uses: actions/upload-artifact@v7
        with:
          name: portal-docs
          path: site/
          retention-days: 7

  build-demo-sphinx:
    name: Demo Sphinx (RST)
    needs: [resolve-deploy-context]
    if: needs.resolve-deploy-context.outputs.should_build == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: 🔀 Checkout repository
        uses: actions/checkout@v6

      - name: 🐍 Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_DEFAULT }}
          cache: pip

      - name: 📦 Install package + Sphinx dependencies
        run: pip install . -r demo-docs/sphinx/requirements.txt

      - name: 📖 Build Sphinx documentation
        working-directory: demo-docs/sphinx
        run: make html

      - name: 📤 Upload Sphinx docs artifact
        uses: actions/upload-artifact@v7
        with:
          name: sphinx-docs
          path: demo-docs/sphinx/build/html/
          retention-days: 7

  build-demo-mkdocs:
    name: Demo MkDocs (Markdown)
    needs: [resolve-deploy-context]
    if: needs.resolve-deploy-context.outputs.should_build == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: 🔀 Checkout repository
        uses: actions/checkout@v6

      - name: 🐍 Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_DEFAULT }}
          cache: pip

      - name: 📦 Install package + MkDocs dependencies
        run: pip install . -r demo-docs/mkdocs/requirements.txt

      - name: 📖 Build MkDocs documentation
        working-directory: demo-docs/mkdocs
        run: mkdocs build --strict

      - name: 📤 Upload MkDocs docs artifact
        uses: actions/upload-artifact@v7
        with:
          name: mkdocs-docs
          path: demo-docs/mkdocs/site/
          retention-days: 7

  assemble-site:
    name: Assemble Site
    needs: [resolve-deploy-context, build-landing-docs, build-demo-sphinx, build-demo-mkdocs]
    if: needs.resolve-deploy-context.outputs.should_build == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Download portal artifact
        uses: actions/download-artifact@v8
        with:
          name: portal-docs
          path: _site

      - name: 📥 Download Sphinx artifact
        uses: actions/download-artifact@v8
        with:
          name: sphinx-docs
          path: _site/demo-sphinx

      - name: 📥 Download MkDocs artifact
        uses: actions/download-artifact@v8
        with:
          name: mkdocs-docs
          path: _site/demo-mkdocs

      - name: 📤 Upload assembled site artifact
        uses: actions/upload-artifact@v7
        with:
          name: assembled-site
          path: _site/
          retention-days: 7

  deploy-pages:
    name: Deploy to GH Pages
    needs: [resolve-deploy-context, assemble-site]
    if: needs.resolve-deploy-context.outputs.should_deploy == 'true'
    permissions:
      contents: write
      id-token: write
      pages: write
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: 🔀 Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 📥 Download assembled site artifact
        uses: actions/download-artifact@v8
        with:
          name: assembled-site
          path: /tmp/assembled-site

      - name: 🗂️ Update versioned docs tree
        id: versioned-site
        env:
          STABLE_TAG: ${{ needs.resolve-deploy-context.outputs.stable_tag }}
          VERSION_PATH: ${{ needs.resolve-deploy-context.outputs.version_path }}
        shell: bash
        run: |
          set -euo pipefail

          assembled_site="/tmp/assembled-site"
          gh_pages_dir="/tmp/gh-pages-site"
          project_name="${GITHUB_REPOSITORY#*/}"

          rm -rf "${gh_pages_dir}"
          [ -n "${VERSION_PATH}" ] || {
            echo "ERROR: VERSION_PATH is empty. resolve-deploy-context did not produce a deployable target." >&2
            exit 1
          }

          if ! branch_ref="$(git ls-remote --heads origin "${GH_PAGES_BRANCH}")"; then
            echo "ERROR: Failed to query ${GH_PAGES_BRANCH} on origin before updating docs state." >&2
            exit 1
          fi

          if [ -n "${branch_ref}" ]; then
            git fetch origin "${GH_PAGES_BRANCH}:refs/remotes/origin/${GH_PAGES_BRANCH}"
            git worktree add -B "${GH_PAGES_BRANCH}" "${gh_pages_dir}" "refs/remotes/origin/${GH_PAGES_BRANCH}"
          else
            git worktree add --detach "${gh_pages_dir}" HEAD
            (
              cd "${gh_pages_dir}"
              git switch --orphan "${GH_PAGES_BRANCH}"
              # git rm drops tracked files; find clears any untracked files left in the orphaned worktree.
              git rm -rf . >/dev/null 2>&1 || true
              find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
            )
          fi

          rsync -a --delete "${assembled_site}/" "${gh_pages_dir}/${VERSION_PATH}/"

          if [ -n "${STABLE_TAG}" ] && [ "${VERSION_PATH}" = "${STABLE_TAG}" ]; then
            rsync -a --delete "${assembled_site}/" "${gh_pages_dir}/stable/"
          fi

          (
            cd "${gh_pages_dir}"
            # Keep only version directories plus the root redirect files.
            # dotglob includes dotfiles; nullglob avoids iterating over literal '*' entries when the tree is empty.
            shopt -s dotglob nullglob
            for entry in * .*; do
              case "${entry}" in
                .|..|.git|.nojekyll|index.html|latest|stable)
                  continue
                  ;;
              esac

              if printf '%s' "${entry}" | grep -Eq "${RELEASE_TAG_PATTERN}"; then
                continue
              fi

              rm -rf "${entry}"
            done

            if [ -d latest ]; then
              redirect_target="latest/"
            elif [ -d stable ]; then
              redirect_target="stable/"
            else
              redirect_target="${VERSION_PATH}/"
            fi

            printf '%s\n' \
              '<!doctype html>' \
              '<html lang="en">' \
              '  <head>' \
              '    <meta charset="utf-8">' \
              "    <meta http-equiv=\"refresh\" content=\"0; url=${redirect_target}\">" \
              "    <link rel=\"canonical\" href=\"${redirect_target}\">" \
              "    <title>${project_name} docs</title>" \
              '  </head>' \
              '  <body>' \
              "    <p>Redirecting to <a href=\"${redirect_target}\">${redirect_target}</a>…</p>" \
              '  </body>' \
              '</html>' > index.html

            touch .nojekyll
          )

      - name: 💾 Commit versioned docs state
        env:
          VERSION_PATH: ${{ needs.resolve-deploy-context.outputs.version_path }}
        shell: bash
        run: |
          set -euo pipefail

          cd /tmp/gh-pages-site
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A

          if git diff --cached --quiet; then
            echo "No documentation changes to publish for ${VERSION_PATH}."
            exit 0
          fi

          git commit -m "docs: deploy ${VERSION_PATH}"
          git push origin HEAD:${GH_PAGES_BRANCH}

      - name: ⚙️ Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: 📤 Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: /tmp/gh-pages-site/

      - name: 🚀 Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v5
