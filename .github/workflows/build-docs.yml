#
# Build & Deploy Docs
#
# Flow:
#
#   Triggers (filtered at the workflow level):
#     - push → main                                    → build + deploy to dev/
#     - push → version-like tag (v1.2, 1.2.3, …)       → build + deploy to <tag>/ (and stable/ if highest)
#     - pull_request → main                            → build only (no deploy)
#     - workflow_dispatch (tag input)                  → build + deploy to <tag>/ (no set-default change)
#
#   Jobs:
#     build-landing-docs ──┐
#     build-demo-sphinx ───┤  (run on every trigger; demo jobs skip gracefully if source absent)
#     build-demo-mkdocs ───┤
#                          ▼
#                       assemble-site  (run on every trigger)
#                          ├─ inject sphinx + mkdocs artifacts into docs/
#                          ├─ mike deploy <version_path> [aliases…] --update-aliases
#                          ├─ mike set-default <latest|stable>  [skipped on workflow_dispatch]
#                          ├─ git push gh-pages [push + workflow_dispatch events] — this IS the deploy
#                          │  (GitHub Pages serves directly from the gh-pages branch)
#                          └─ upload built site as workflow artifact (manual inspection)
#
#   permissions:
#     - default workflow permission is contents: read
#     - assemble-site escalates to contents: write for git push
#
name: Build & Deploy Docs

on:
  push:
    branches: [main]
    # Version-like tags only — non-version tags (test, feature, etc.) are excluded at trigger level.
    # rc/dev/post tags that resemble semver (e.g. v1.2.3rc1) may still trigger a build but
    # will be excluded from deployment because they won't match RELEASE_TAG_PATTERN.
    tags:
      - "v[0-9]*.[0-9]*" # v1.2, v1.2.3 — optional lowercase v prefix
      - "[0-9]*.[0-9]*" # 1.2, 1.2.3 — no v prefix
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      tag:
        description: "Git tag to backfill (e.g. v0.7.0). Must already exist on the remote."
        required: true
        type: string
      alias:
        description: "Optional mike alias to attach (e.g. stable). Leave empty for none."
        required: false
        type: string
        default: ""

permissions:
  contents: read

env:
  GH_PAGES_BRANCH: gh-pages
  PYTHON_DEFAULT: "3.13"
  # Final release tags only — optional lowercase v prefix, two+ numeric segments.
  # Accepted: v1.2, v1.2.3, 1.2.3    Rejected: v1.0.0rc1, 1.2.0.dev1, v1 (one segment), v1.2.3-final
  RELEASE_TAG_PATTERN: '^v?[0-9]+(\.[0-9]+)+$'

defaults:
  run:
    shell: bash

jobs:
  build-landing-docs:
    name: Portal (landing-docs)
    runs-on: ubuntu-latest

    steps:
      - name: 🔀 Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          ref: ${{ inputs.tag || '' }}

      - name: 🐍 Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: ${{ env.PYTHON_DEFAULT }}
          cache: pip

      - name: 🔎 Verify mkdocs.yml exists at this ref
        if: github.event_name == 'workflow_dispatch'
        run: |
          if [ ! -f mkdocs.yml ]; then
            echo "::error::Tag '${{ inputs.tag }}' has no mkdocs.yml — cannot build docs. Earliest supported tag: v0.7.0."
            exit 1
          fi

      - name: 📦 Install portal dependencies
        run: pip install -r docs/requirements.txt

      - name: 📄 Generate docs/index.md from README if missing
        # Historical tags (e.g. v0.7.0) expected docs/index.md to be generated at build time.
        if: github.event_name == 'workflow_dispatch'
        run: |
          if [ ! -f docs/index.md ] && [ -f README.md ]; then
            mkdir -p docs
            cp README.md docs/index.md
          fi

      - name: 📖 Build portal
        # Drop --strict for dispatch: historical docs may have nav entries pointing to demo dirs
        # that are injected only at assemble time. Strict is enforced on push/PR where it matters.
        run: mkdocs build ${{ github.event_name != 'workflow_dispatch' && '--strict' || '' }}

      - name: 📄 Copy Markdown sources into site for .md URL support
        run: |
          mkdir -p site
          cp docs/index.md site/index.md

      - name: 📤 Upload portal artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: portal-docs
          path: site/
          retention-days: 7

  build-demo-sphinx:
    name: Demo Sphinx (RST)
    runs-on: ubuntu-latest

    steps:
      - name: 🔀 Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ inputs.tag || '' }}

      - name: 🐍 Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: ${{ env.PYTHON_DEFAULT }}
          cache: pip

      - name: 📦 Install package + Sphinx dependencies
        run: |
          [ -d demo-docs/sphinx ] || { echo "::notice::demo-docs/sphinx absent at this ref — skipping Sphinx demo."; exit 0; }
          pip install . -r demo-docs/sphinx/requirements.txt

      - name: 📖 Build Sphinx documentation
        run: |
          [ -d demo-docs/sphinx ] || exit 0
          cd demo-docs/sphinx && make html

      - name: 📤 Upload Sphinx docs artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: sphinx-docs
          path: demo-docs/sphinx/build/html/
          if-no-files-found: warn
          retention-days: 7

  build-demo-mkdocs:
    name: Demo MkDocs (Markdown)
    runs-on: ubuntu-latest

    steps:
      - name: 🔀 Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ inputs.tag || '' }}

      - name: 🐍 Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: ${{ env.PYTHON_DEFAULT }}
          cache: pip

      - name: 📦 Install package + MkDocs dependencies
        run: |
          [ -d demo-docs/mkdocs ] || { echo "::notice::demo-docs/mkdocs absent at this ref — skipping MkDocs demo."; exit 0; }
          pip install . -r demo-docs/mkdocs/requirements.txt

      - name: 📖 Build MkDocs documentation
        run: |
          [ -d demo-docs/mkdocs ] || exit 0
          cd demo-docs/mkdocs && mkdocs build --strict

      - name: 📤 Upload MkDocs docs artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: mkdocs-docs
          path: demo-docs/mkdocs/site/
          if-no-files-found: warn
          retention-days: 7

  assemble-site:
    name: Assemble & Mike Deploy
    needs: [build-landing-docs, build-demo-sphinx, build-demo-mkdocs]
    concurrency:
      group: gh-pages
      cancel-in-progress: false
    permissions:
      contents: write
    runs-on: ubuntu-latest

    steps:
      - name: 🔀 Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          ref: ${{ inputs.tag || '' }}

      - name: 🐍 Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: ${{ env.PYTHON_DEFAULT }}
          cache: pip

      - name: 📦 Install mike
        run: |
          pip install -r docs/requirements.txt
          # Ensure mike is available even when not listed in historical tags' requirements.txt
          pip install "mike>=2.1,<3"

      - name: 🔑 Configure git identity for mike
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: 📥 Fetch existing gh-pages branch (if any)
        run: |
          set -euo pipefail
          if git ls-remote --exit-code --heads origin "${GH_PAGES_BRANCH}" >/dev/null 2>&1; then
            git fetch origin "${GH_PAGES_BRANCH}:${GH_PAGES_BRANCH}"
          else
            echo "No remote ${GH_PAGES_BRANCH} branch yet — mike will create it on first deploy."
          fi

      - name: 📄 Generate docs/index.md from README if missing
        # Historical tags (e.g. v0.7.0) expected docs/index.md to be generated at build time.
        if: github.event_name == 'workflow_dispatch'
        run: |
          if [ ! -f docs/index.md ] && [ -f README.md ]; then
            mkdir -p docs
            cp README.md docs/index.md
          fi

      - name: 📥 Download Sphinx artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: sphinx-docs
          path: docs/demo-sphinx

      - name: 📥 Download MkDocs artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: mkdocs-docs
          path: docs/demo-mkdocs

      - name: 🏷️ Resolve version path
        run: |
          set -euo pipefail

          SKIP="false"
          ALIASES=""
          SET_DEFAULT=""
          STABLE_TAG=""

          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            # Backfill: use the user-supplied tag; never change set-default.
            VERSION_PATH="${{ inputs.tag }}"
            ALIASES="${{ inputs.alias }}"
          elif [ "${GITHUB_REF_TYPE}" = "branch" ]; then
            # Unreleased main branch — never set as default; users want stable docs by default.
            VERSION_PATH="dev"
          else
            if [[ ! "${GITHUB_REF_NAME}" =~ ${RELEASE_TAG_PATTERN} ]]; then
              echo "Skipping docs deploy for non-final tag: ${GITHUB_REF_NAME}"
              echo "SKIP=true" >> "$GITHUB_ENV"
              exit 0
            fi
            VERSION_PATH="${GITHUB_REF_NAME}"
            STABLE_TAG="$(git tag --list | { grep -E "${RELEASE_TAG_PATTERN}" || true; } | sort -V | tail -1)"
            if [ -n "${STABLE_TAG}" ] && [ "${VERSION_PATH}" = "${STABLE_TAG}" ]; then
              ALIASES="stable"
              SET_DEFAULT="stable"
            fi
          fi

          {
            echo "SKIP=${SKIP}"
            echo "VERSION_PATH=${VERSION_PATH}"
            echo "STABLE_TAG=${STABLE_TAG}"
            echo "ALIASES=${ALIASES}"
            echo "SET_DEFAULT=${SET_DEFAULT}"
          } >> "$GITHUB_ENV"

      - name: 🚀 Mike deploy
        if: env.SKIP != 'true'
        run: |
          set -euo pipefail

          # Re-expand space-separated aliases string into a bash array.
          # `${aliases[@]+"${aliases[@]}"}` is the empty-array-safe expansion under `set -u`.
          read -ra aliases <<< "${ALIASES}"

          # Run mike without --push; single git push below lands deploy + set-default atomically.
          mike deploy \
            --update-aliases \
            --branch "${GH_PAGES_BRANCH}" \
            "${VERSION_PATH}" \
            ${aliases[@]+"${aliases[@]}"}

      - name: 🔧 Mike set-default
        if: env.SKIP != 'true' && env.SET_DEFAULT != ''
        run: |
          set -euo pipefail
          mike set-default \
            --branch "${GH_PAGES_BRANCH}" \
            --template docs/overrides/mike_redirect.html \
            "${SET_DEFAULT}"

      - name: 🤖 Deploy root-level AI discoverability files
        if: env.SKIP != 'true'
        run: |
          set -euo pipefail
          # robots.txt and llms.txt must live at the gh-pages root so AI crawlers find them
          # at the canonical paths /robots.txt and /llms.txt. Mike deploys versioned content
          # only to subdirectories, so we inject these files directly into the branch root.
          # Use a non-existent path — git worktree add creates it; mktemp -d would pre-create
          # the directory and cause "already exists" failure.
          TMPWORKTREE="/tmp/pyDeprecate-gh-pages-$$"
          git worktree add "$TMPWORKTREE" "${GH_PAGES_BRANCH}"
          trap 'git worktree remove --force "$TMPWORKTREE" 2>/dev/null || true' EXIT
          cp docs/robots.txt "$TMPWORKTREE/robots.txt"
          cp docs/llms.txt "$TMPWORKTREE/llms.txt"
          git -C "$TMPWORKTREE" add robots.txt llms.txt
          git -C "$TMPWORKTREE" diff --cached --quiet \
            || git -C "$TMPWORKTREE" commit -m "chore(deploy): sync root robots.txt and llms.txt for AI crawler discoverability"
          trap - EXIT
          git worktree remove --force "$TMPWORKTREE"

      - name: 📦 Export built site
        if: env.SKIP != 'true'
        run: |
          set -euo pipefail
          mkdir -p _site_export
          git archive "${GH_PAGES_BRANCH}" | tar -x -C _site_export

      - name: 📤 Upload site artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: built-site
          path: _site_export/
          retention-days: 7

      - name: 📤 Push gh-pages branch
        if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && env.SKIP != 'true'
        run: git push origin "${GH_PAGES_BRANCH}"
