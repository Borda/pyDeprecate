#
# Build & Deploy Docs
#
# Flow:
#
#   [push → main] / [push → final release tag] / [pull_request → main]
#     │
#     ├─ resolve-deploy-context ── decides:
#     │    ├─ main push            → build + deploy to latest/
#     │    ├─ final release tag    → build + deploy to <tag>/ and stable/ if highest tag
#     │    ├─ non-release tag      → skip build/deploy
#     │    └─ pull request         → build only (no deploy)
#     │
#     ├─ build-landing-docs ──┐
#     ├─ build-demo-sphinx ───┤
#     └─ build-demo-mkdocs ───┤
#                             ▼
#                          assemble-site (always for buildable events)
#                             ├─ download portal, sphinx, mkdocs artifacts
#                             ├─ assemble _site/{demo-sphinx,demo-mkdocs} + portal at root
#                             └─ upload assembled-site artifact
#                             ▼ [deployable pushes only]
#                          deploy-pages
#                             ├─ load gh-pages worktree state
#                             ├─ sync assembled site into latest/ or <tag>/
#                             ├─ mirror highest final release to stable/
#                             ├─ refresh root redirect + .nojekyll
#                             ├─ commit/push gh-pages branch
#                             └─ upload/deploy Pages artifact
#
#   permissions:
#     - default workflow permission is contents: read
#     - deploy-pages escalates to contents/pages/id-token write only when deploying
#
name: Build & Deploy Docs

on:
  push:
    branches: [main]
    tags: ["*"]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  GH_PAGES_BRANCH: gh-pages
  PYTHON_DEFAULT: "3.13"
  # Final release tags only — accepts optional 'v'/'V' prefix and two+ numeric segments.
  # Accepted: v1.2, v1.2.3, 1.2.3, V2.0    Rejected: v1.0.0rc1, 1.2.0.dev1, v1 (one segment), v1.2.3-final
  RELEASE_TAG_PATTERN: '^[vV]?[0-9]+(\.[0-9]+)+$'

jobs:
  resolve-deploy-context:
    name: Resolve deploy context
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.context.outputs.should_build }}
      should_deploy: ${{ steps.context.outputs.should_deploy }}
      stable_tag: ${{ steps.context.outputs.stable_tag }}
      version_path: ${{ steps.context.outputs.version_path }}

    steps:
      - name: 🔀 Checkout repository
        uses: actions/checkout@v6
        with:
          # Full history only needed for tag events (stable_tag scan via git tag --list).
          # Branch pushes and PRs use a shallow clone to avoid the overhead.
          fetch-depth: ${{ github.ref_type == 'tag' && 0 || 1 }}

      - name: 🧮 Resolve target version
        id: context
        shell: bash
        run: |
          set -euo pipefail

          should_build=true
          should_deploy=false
          stable_tag=""
          version_path=""

          if [ "${GITHUB_EVENT_NAME}" = "push" ] && [ "${GITHUB_REF_TYPE:-}" = "branch" ] && [ "${GITHUB_REF_NAME}" = "main" ]; then
            should_deploy=true
            version_path="latest"
          elif [ "${GITHUB_EVENT_NAME}" = "push" ] && [ "${GITHUB_REF_TYPE:-}" = "tag" ]; then
            should_build=false

            if printf '%s' "${GITHUB_REF_NAME}" | grep -Eq "${RELEASE_TAG_PATTERN}"; then
              should_build=true
              should_deploy=true
              version_path="${GITHUB_REF_NAME}"
              # stable_tag only needed for release-tag deploys (to mirror highest tag → stable/).
              # Full tag history is available here because fetch-depth=0 for tag events.
              stable_tag="$(python -c "import os, re, subprocess; pattern = os.environ['RELEASE_TAG_PATTERN']; tags = subprocess.check_output(['git', 'tag', '--list'], text=True).splitlines(); release_tags = [tag for tag in tags if re.fullmatch(pattern, tag)]; print(max(release_tags, key=lambda tag: tuple(int(part) for part in tag.lstrip('vV').split('.'))), end='') if release_tags else None")"
            else
              echo "Skipping deploy: tag '${GITHUB_REF_NAME}' does not match RELEASE_TAG_PATTERN (${RELEASE_TAG_PATTERN}) — dev/rc/post tags are excluded from versioned docs deploys."
            fi
          fi

          {
            echo "should_build=${should_build}"
            echo "should_deploy=${should_deploy}"
            echo "stable_tag=${stable_tag}"
            echo "version_path=${version_path}"
          } >> "${GITHUB_OUTPUT}"

  build-landing-docs:
    name: Portal (landing-docs)
    needs: [resolve-deploy-context]
    if: needs.resolve-deploy-context.outputs.should_build == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: 🔀 Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 🐍 Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_DEFAULT }}
          cache: pip

      - name: 📦 Install portal dependencies
        run: pip install -r docs/requirements.txt

      - name: 📖 Build portal
        # Documentation screenshots (demo-docs-*.png) live under docs/assets/images/ so MkDocs picks them up
        # natively without a copy step.
        run: mkdocs build --strict

      - name: 📄 Copy Markdown sources into site for .md URL support
        run: |
          mkdir -p site
          cp docs/index.md site/index.md

      - name: 📤 Upload portal artifact
        uses: actions/upload-artifact@v7
        with:
          name: portal-docs
          path: site/
          retention-days: 7

  build-demo-sphinx:
    name: Demo Sphinx (RST)
    needs: [resolve-deploy-context]
    if: needs.resolve-deploy-context.outputs.should_build == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: 🔀 Checkout repository
        uses: actions/checkout@v6

      - name: 🐍 Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_DEFAULT }}
          cache: pip

      - name: 📦 Install package + Sphinx dependencies
        run: pip install . -r demo-docs/sphinx/requirements.txt

      - name: 📖 Build Sphinx documentation
        working-directory: demo-docs/sphinx
        run: make html

      - name: 📤 Upload Sphinx docs artifact
        uses: actions/upload-artifact@v7
        with:
          name: sphinx-docs
          path: demo-docs/sphinx/build/html/
          retention-days: 7

  build-demo-mkdocs:
    name: Demo MkDocs (Markdown)
    needs: [resolve-deploy-context]
    if: needs.resolve-deploy-context.outputs.should_build == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: 🔀 Checkout repository
        uses: actions/checkout@v6

      - name: 🐍 Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_DEFAULT }}
          cache: pip

      - name: 📦 Install package + MkDocs dependencies
        run: pip install . -r demo-docs/mkdocs/requirements.txt

      - name: 📖 Build MkDocs documentation
        working-directory: demo-docs/mkdocs
        run: mkdocs build --strict

      - name: 📤 Upload MkDocs docs artifact
        uses: actions/upload-artifact@v7
        with:
          name: mkdocs-docs
          path: demo-docs/mkdocs/site/
          retention-days: 7

  assemble-site:
    name: Assemble Site
    needs: [resolve-deploy-context, build-landing-docs, build-demo-sphinx, build-demo-mkdocs]
    if: needs.resolve-deploy-context.outputs.should_build == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Download portal artifact
        uses: actions/download-artifact@v8
        with:
          name: portal-docs
          path: _site

      - name: 📥 Download Sphinx artifact
        uses: actions/download-artifact@v8
        with:
          name: sphinx-docs
          path: _site/demo-sphinx

      - name: 📥 Download MkDocs artifact
        uses: actions/download-artifact@v8
        with:
          name: mkdocs-docs
          path: _site/demo-mkdocs

      - name: 📤 Upload assembled site artifact
        uses: actions/upload-artifact@v7
        with:
          name: assembled-site
          path: _site/
          retention-days: 7

  deploy-pages:
    name: Deploy to GH Pages
    needs: [resolve-deploy-context, assemble-site]
    if: needs.resolve-deploy-context.outputs.should_deploy == 'true'
    concurrency:
      group: gh-pages
      cancel-in-progress: false
    permissions:
      contents: write
      id-token: write
      pages: write
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: 🔀 Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 📥 Download assembled site artifact
        uses: actions/download-artifact@v8
        with:
          name: assembled-site
          path: /tmp/assembled-site

      - name: 🗂️ Update versioned docs tree
        env:
          STABLE_TAG: ${{ needs.resolve-deploy-context.outputs.stable_tag }}
          VERSION_PATH: ${{ needs.resolve-deploy-context.outputs.version_path }}
        shell: bash
        run: |
          set -euo pipefail

          assembled_site="/tmp/assembled-site"
          gh_pages_dir="/tmp/gh-pages-site"
          project_name="${GITHUB_REPOSITORY#*/}"

          rm -rf "${gh_pages_dir}"
          [ -n "${VERSION_PATH}" ] || {
            echo "ERROR: VERSION_PATH is empty. resolve-deploy-context did not produce a deployable target." >&2
            exit 1
          }

          if ! branch_ref="$(git ls-remote --heads origin "${GH_PAGES_BRANCH}")"; then
            echo "ERROR: Failed to query ${GH_PAGES_BRANCH} on origin before updating docs state." >&2
            exit 1
          fi

          if [ -n "${branch_ref}" ]; then
            git fetch origin "${GH_PAGES_BRANCH}:refs/remotes/origin/${GH_PAGES_BRANCH}"
            git worktree add -B "${GH_PAGES_BRANCH}" "${gh_pages_dir}" "refs/remotes/origin/${GH_PAGES_BRANCH}"
          else
            git worktree add --detach "${gh_pages_dir}" HEAD
            (
              cd "${gh_pages_dir}"
              git switch --orphan "${GH_PAGES_BRANCH}"
              # git rm drops tracked files; find clears any untracked files left in the orphaned worktree.
              git rm -rf . >/dev/null 2>&1 || true
              find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
            )
          fi

          rsync -a --delete "${assembled_site}/" "${gh_pages_dir}/${VERSION_PATH}/"

          if [ -n "${STABLE_TAG}" ] && [ "${VERSION_PATH}" = "${STABLE_TAG}" ]; then
            rsync -a --delete "${assembled_site}/" "${gh_pages_dir}/stable/"
          fi

          (
            cd "${gh_pages_dir}"
            # Keep only version directories plus the root redirect files.
            # dotglob includes dotfiles; nullglob avoids iterating over literal '*' entries when the tree is empty.
            shopt -s dotglob nullglob
            for entry in * .*; do
              case "${entry}" in
                .|..|.git|.nojekyll|index.html|latest|stable)
                  continue
                  ;;
              esac

              if printf '%s' "${entry}" | grep -Eq "${RELEASE_TAG_PATTERN}"; then
                continue
              fi

              rm -rf "${entry}"
            done

            if [ -d latest ]; then
              redirect_target="latest/"
            elif [ -d stable ]; then
              redirect_target="stable/"
            else
              redirect_target="${VERSION_PATH}/"
            fi

            printf '%s\n' \
              '<!doctype html>' \
              '<html lang="en">' \
              '  <head>' \
              '    <meta charset="utf-8">' \
              "    <meta http-equiv=\"refresh\" content=\"0; url=${redirect_target}\">" \
              "    <link rel=\"canonical\" href=\"${redirect_target}\">" \
              "    <title>${project_name} docs</title>" \
              '  </head>' \
              '  <body>' \
              "    <p>Redirecting to <a href=\"${redirect_target}\">${redirect_target}</a>…</p>" \
              '  </body>' \
              '</html>' > index.html

            touch .nojekyll
          )

      - name: 💾 Commit versioned docs state
        env:
          VERSION_PATH: ${{ needs.resolve-deploy-context.outputs.version_path }}
        shell: bash
        run: |
          set -euo pipefail

          cd /tmp/gh-pages-site
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A

          if git diff --cached --quiet; then
            echo "No documentation changes to publish for ${VERSION_PATH}."
            exit 0
          fi

          git commit -m "docs: deploy ${VERSION_PATH}"
          # --force-with-lease rejects the push if the remote moved since our fetch; retry once
          # by re-fetching and rebasing to handle a concurrent deploy from a simultaneous event.
          if ! git push --force-with-lease=refs/heads/${GH_PAGES_BRANCH}:refs/remotes/origin/${GH_PAGES_BRANCH} origin HEAD:${GH_PAGES_BRANCH}; then
            echo "Push rejected (remote moved) — re-fetching and rebasing for retry…"
            git fetch origin "${GH_PAGES_BRANCH}:refs/remotes/origin/${GH_PAGES_BRANCH}"
            git rebase "refs/remotes/origin/${GH_PAGES_BRANCH}"
            git push --force-with-lease=refs/heads/${GH_PAGES_BRANCH}:refs/remotes/origin/${GH_PAGES_BRANCH} origin HEAD:${GH_PAGES_BRANCH}
          fi

      - name: 📦 Export clean Pages artifact (no git metadata)
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/gh-pages-export
          rsync -a --exclude='.git' /tmp/gh-pages-site/ /tmp/gh-pages-export/

      - name: ⚙️ Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: 📤 Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: /tmp/gh-pages-export/

      - name: 🚀 Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v5
