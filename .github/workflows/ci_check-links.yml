name: Check links & references

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Run once a week on Sundays
    - cron: "0 9 * * 0"

jobs:
  links-check:
    runs-on: ubuntu-latest
    steps:
      - name: 🔀 Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Cache lychee results
        if: github.event_name == 'pull_request'
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: .lycheecache
          key: cache-lychee-${{ github.event.pull_request.number }}-${{ github.sha }}
          restore-keys: |
            cache-lychee-${{ github.event.pull_request.number }}-
            cache-lychee-

      - name: 🔗 Link Checker
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2
        with:
          # default args: "--verbose --no-progress './**/*.md' './**/*.html' './**/*.rst'"
          # TODO: drop exclude for stable docs after the next release
          args: |
            --verbose
            --no-progress
            --cache
            --max-cache-age 1d
            './**/*.md'
            './**/*.rst'
            './**/*.py'
            './**/*.yml'
            './**/*.yaml'
            './**/*.toml'
            --include-verbatim
            --exclude https://github.com/YOUR-USERNAME/pyDeprecate.git
            --exclude https://codecov.io/validate
            --exclude https://medium.com/codex/mastering-api-deprecation-*
            --exclude http://127.0.0.1
            --exclude file://.*demo-sphinx.*
            --exclude file://.*demo-mkdocs.*
            --exclude '^https[:]//borda[/]$'
            --exclude 'https://github\.com/\$'
          fail: true
