# Build Demo Docs
#
# Flow:
#
#   push → main          pull_request → main
#     │                        │
#     ├─ sphinx-docs ──┐        ├─ sphinx-docs
#     └─ mkdocs ───────┤        └─ mkdocs
#                      │           (deploy skipped — if: push only)
#                      ▼
#                   deploy
#                     ├─ download sphinx-docs  (same run, no run-id needed)
#                     ├─ download mkdocs-docs  (same run, no run-id needed)
#                     ├─ cp temp_docs/index.html → _site/
#                     └─ actions/deploy-pages
#
#   pages: write and id-token: write are scoped to the deploy job only —
#   pull requests keep the minimal contents: read permission.

name: Build Demo Docs

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Minimal default; deploy job overrides with pages + id-token.
permissions:
  contents: read

env:
  PYTHON_DEFAULT: "3.13"

jobs:
  sphinx-docs:
    name: Sphinx (RST)
    runs-on: ubuntu-latest

    steps:
      - name: 🔀 Checkout repository
        uses: actions/checkout@v6

      - name: 🐍 Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_DEFAULT }}

      - name: 📦 Install package + Sphinx dependencies
        run: pip install -e . -r temp_docs_sphinx/requirements.txt

      - name: 📖 Build Sphinx documentation
        working-directory: temp_docs_sphinx
        run: make html

      - name: 📤 Upload Sphinx docs artifact
        uses: actions/upload-artifact@v4
        with:
          name: sphinx-docs
          path: temp_docs_sphinx/build/html/
          retention-days: 7

  mkdocs:
    name: MkDocs (Markdown)
    runs-on: ubuntu-latest

    steps:
      - name: 🔀 Checkout repository
        uses: actions/checkout@v6

      - name: 🐍 Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_DEFAULT }}

      - name: 📦 Install package + MkDocs dependencies
        run: pip install -e . -r temp_docs_mkdocs/requirements.txt

      - name: 📖 Build MkDocs documentation
        working-directory: temp_docs_mkdocs
        run: mkdocs build --strict

      - name: 📤 Upload MkDocs docs artifact
        uses: actions/upload-artifact@v4
        with:
          name: mkdocs-docs
          path: temp_docs_mkdocs/site/
          retention-days: 7

  deploy:
    name: Deploy to GitHub Pages
    needs: [sphinx-docs, mkdocs]
    runs-on: ubuntu-latest
    # Only deploy on pushes to main — skip on pull requests.
    if: github.event_name == 'push'
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: 🔀 Checkout repository (for portal page)
        uses: actions/checkout@v6

      - name: 📥 Download Sphinx artifact
        uses: actions/download-artifact@v4
        with:
          name: sphinx-docs
          path: _site/sphinx

      - name: 📥 Download MkDocs artifact
        uses: actions/download-artifact@v4
        with:
          name: mkdocs-docs
          path: _site/mkdocs

      - name: 🗂️ Place portal page at root
        run: cp temp_docs/index.html _site/index.html

      - name: ⚙️ Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: 📤 Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site/

      - name: 🚀 Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
