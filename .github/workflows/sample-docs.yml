name: Build Demo Docs

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  sphinx-docs:
    name: Sphinx (RST)
    runs-on: ubuntu-latest

    steps:
      - name: 🔀 Checkout repository
        uses: actions/checkout@v6

      - name: 🐍 Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: 📦 Install package + Sphinx dependencies
        run: pip install -e . -r temp_docs_sphinx/requirements.txt

      - name: 📖 Build Sphinx documentation
        working-directory: temp_docs_sphinx
        run: make html

  mkdocs:
    name: MkDocs (Markdown)
    runs-on: ubuntu-latest

    steps:
      - name: 🔀 Checkout repository
        uses: actions/checkout@v6

      - name: 🐍 Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: 📦 Install package + MkDocs dependencies
        run: pip install -e . -r temp_docs_mkdocs/requirements.txt

      - name: 📖 Build MkDocs documentation
        working-directory: temp_docs_mkdocs
        run: mkdocs build --strict
