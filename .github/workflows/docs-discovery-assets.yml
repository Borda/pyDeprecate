name: Docs discovery assets

# This workflow MUST only publish from the main branch.
# robots.txt, llms.txt, and sitemap.xml live at the gh-pages root and are read directly
# by AI crawlers (GPTBot, ClaudeBot, OAI-SearchBot) and search engines. Publishing a
# dev-branch or PR version would overwrite the authoritative root files with unreviewed
# content and could mislead AI agents about pyDeprecate's public API contract.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - docs/robots.txt
      - docs/llms.txt
      - docs/llms-full.txt
      - docs/root-sitemap.xml
      - .github/workflows/docs-discovery-assets.yml
  schedule:
    - cron: "17 6 * * *"

permissions:
  contents: write

concurrency:
  group: gh-pages
  cancel-in-progress: false

jobs:
  publish-root-assets:
    name: Publish root crawler and agent assets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          path: source

      - name: Checkout GitHub Pages branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: gh-pages
          path: gh-pages

      - name: Copy root discovery assets
        run: |
          set -euo pipefail
          cp source/docs/robots.txt gh-pages/robots.txt
          cp source/docs/llms.txt gh-pages/llms.txt
          cp source/docs/llms-full.txt gh-pages/llms-full.txt
          cp source/docs/root-sitemap.xml gh-pages/sitemap.xml

      - name: Verify critical content markers
        run: |
          set -euo pipefail
          grep -q '# pyDeprecate' gh-pages/llms.txt
          grep -q 'Import name' gh-pages/llms.txt
          grep -q 'Package name' gh-pages/llms.txt
          grep -q 'Decision Flowchart' gh-pages/llms.txt
          grep -q 'Anti-Patterns' gh-pages/llms.txt
          grep -q 'Sitemap: https://borda.github.io/pyDeprecate/sitemap.xml' gh-pages/robots.txt
          grep -q 'User-agent: GPTBot' gh-pages/robots.txt
          grep -q 'User-agent: OAI-SearchBot' gh-pages/robots.txt
          grep -q 'User-agent: ClaudeBot' gh-pages/robots.txt

      - name: Commit root discovery assets
        working-directory: gh-pages
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add robots.txt llms.txt llms-full.txt sitemap.xml
          if git diff --cached --quiet; then
            echo "Root discovery assets are already current."
          else
            git commit -m "docs: publish root discovery assets"
            git push
          fi

  monitor-published-assets:
    name: Monitor ${{ matrix.path }}
    runs-on: ubuntu-latest
    needs: publish-root-assets
    env:
      BASE_URL: https://borda.github.io/pyDeprecate
    strategy:
      fail-fast: false
      matrix:
        path:
          - "/"
          - "/stable/"
          - "/robots.txt"
          - "/llms.txt"
          - "/llms-full.txt"
          - "/sitemap.xml"
          - "/stable/sitemap.xml"
    steps:
      - name: Check URL is reachable
        run: |
          set -euo pipefail
          url="${BASE_URL}${{ matrix.path }}"
          for attempt in 1 2 3 4 5; do
            status="$(curl -L -s -o /dev/null -w '%{http_code}' "$url")"
            if [ "$status" = "200" ]; then
              echo "OK $url -> $status"
              exit 0
            fi
            echo "Attempt $attempt: $url -> $status"
            sleep 20
          done
          echo "FAIL $url -> $status"
          exit 1
