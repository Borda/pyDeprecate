site_name: pyDeprecate
site_description: Simple tooling for marking deprecated functions or classes and re-routing to their successors.
site_url: https://borda.github.io/pyDeprecate/
repo_url: https://github.com/Borda/pyDeprecate
repo_name: Borda/pyDeprecate
edit_uri: ""
docs_dir: docs
use_directory_urls: false
copyright: Copyright &copy; 2020&ndash;2026 Jiri Borovec

hooks:
  - docs/mkdocs_hooks.py

exclude_docs: |
  overrides/

theme:
  name: material
  custom_dir: docs/overrides

plugins:
  - search
  - git-revision-date-localized:
      enable_creation_date: true
      type: iso_date
      fallback_to_build_date: true

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - meta
  - toc:
      permalink: "🔗"
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences

validation:
  links:
    not_found: ignore
    unrecognized_links: ignore

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - User Guide:
      - Use Cases: guide/use-cases.md
      - void() Helper: guide/void-helper.md
      - Audit Tools: guide/audit.md
      - Customization: guide/customization.md
  - Troubleshooting: troubleshooting.md
  - Demos:
      - Sphinx: demo-sphinx/index.md
      - MkDocs: demo-mkdocs/index.md
