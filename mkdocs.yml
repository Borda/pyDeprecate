site_name: pyDeprecate — Python Deprecation Library
site_description: >-
  Python deprecation decorator library for API migration: automatic call forwarding,
  argument renaming, class and instance deprecation, warning control, and CI audit
  checks for removal deadlines. Zero runtime dependencies.
site_url: https://borda.github.io/pyDeprecate/
repo_url: https://github.com/Borda/pyDeprecate
repo_name: Borda/pyDeprecate
edit_uri: ""
docs_dir: docs
use_directory_urls: false
copyright: Copyright &copy; 2020&ndash;2026 Jiri Borovec

hooks:
  - docs/mkdocs_hooks.py

exclude_docs: |
  overrides/

theme:
  name: material
  custom_dir: docs/overrides

plugins:
  - search
  - git-revision-date-localized:
      enable_creation_date: true
      type: iso_date
      fallback_to_build_date: true

extra:
  version:
    provider: mike
    default: stable

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - meta
  - toc:
      permalink: "🔗"
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

validation:
  links:
    not_found: ignore
    unrecognized_links: ignore

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - User Guide:
      - Use Cases: guide/use-cases.md
      - Python Deprecation Decorator: guide/python-deprecation-decorator.md
      - Replace warnings.warn: guide/replace-warnings-warn.md
      - Deprecate Arguments: guide/deprecate-arguments.md
      - API Migration CI: guide/api-migration-ci.md
      - Agent Recipes: guide/agent-recipes.md
      - Class and Object Deprecation: guide/class-object-deprecation.md
      - Compare Python Deprecation Tools: guide/compare-python-deprecation-tools.md
      - void() Helper: guide/void-helper.md
      - Audit Tools: guide/audit.md
      - CLI: guide/cli.md
      - Customization: guide/customization.md
      - Migration Guide: guide/migration.md
  - Troubleshooting: troubleshooting.md
  - Changelog: changelog.md
  - Demos:
      - Sphinx: demo-sphinx/index.html
      - MkDocs: demo-mkdocs/index.html
